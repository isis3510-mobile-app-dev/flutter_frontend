name: flutter_frontend
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.7

dependencies:
  firebase_auth: ^5.5.2
  firebase_core: ^3.13.0
  flutter:
    sdk: flutter
  flutter_dotenv: ^5.2.1
  flutter_svg: ^2.0.10
  google_sign_in: ^6.2.1
  http: ^1.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/app/
    - assets/icons/eventsIcons/
    - assets/icons/featureIcons/
    - assets/icons/petRelated/
    - assets/icons/profile/
    - assets/icons/socialIcons/
    - assets/icons/status/
