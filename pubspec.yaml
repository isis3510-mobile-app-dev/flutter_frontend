name: flutter_frontend
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.7

dependencies:
  ambient_light: ^0.1.4
  connectivity_plus: ^6.1.5
  firebase_auth: ^5.5.2
  firebase_core: ^3.13.0
  firebase_storage: ^12.4.5
  file_picker: ^10.3.2
  flutter:
    sdk: flutter
  flutter_dotenv: ^5.2.1
  flutter_svg: ^2.0.10
  google_sign_in: ^6.2.1
  http: ^1.6.0
  image_picker: ^1.1.2
  nfc_manager: ^4.1.1
  path_provider: ^2.1.1
  path: ^1.9.1
  shared_preferences: ^2.2.2
  sqflite: ^2.4.2
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/logo.png
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/
    - assets/icons/app/
    - assets/icons/eventsIcons/
    - assets/icons/featureIcons/
    - assets/icons/petRelated/
    - assets/icons/profile/
    - assets/icons/socialIcons/
    - assets/icons/status/
